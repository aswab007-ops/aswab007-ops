<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Muhammad Aswab Khalil cyberpunk portfolio banner">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22F7FF"/>
      <stop offset="50%" stop-color="#B084F5"/>
      <stop offset="100%" stop-color="#FF4FE3"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="bgGlowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12E8F5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#12E8F5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlowPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4FE3" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FF4FE3" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="textGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="circuit" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M0 60 H40 V20 H90" stroke="#1FB9D9" stroke-width="1" fill="none" opacity="0.35"/>
      <path d="M60 0 V40 H110 V90" stroke="#B45FE0" stroke-width="1" fill="none" opacity="0.25"/>
      <circle cx="40" cy="20" r="2.2" fill="#22F7FF" opacity="0.5"/>
      <circle cx="110" cy="90" r="2.2" fill="#FF4FE3" opacity="0.4"/>
    </pattern>
    <clipPath id="rounded">
      <rect x="0" y="0" width="1200" height="520" rx="26"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="1200" height="520" fill="#020608"/>
    <rect width="1200" height="520" fill="url(#circuit)"/>

    <!-- roaming ambient glows -->
    <circle r="260" fill="url(#bgGlowCyan)">
      <animate attributeName="cx" values="120;950;300;120" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;300;450;80" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle r="240" fill="url(#bgGlowPink)">
      <animate attributeName="cx" values="1050;220;800;1050" dur="21s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="420;140;60;420" dur="21s" repeatCount="indefinite"/>
    </circle>

    <!-- scattered binary specks -->
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#2FD9E8" opacity="0.28">
      <text x="30" y="40">0 1 1 0</text>
      <text x="1060" y="35">1 0 0 1</text>
      <text x="1090" y="470">0 1 0 1</text>
      <text x="24" y="500">1 1 0 0</text>
      <text x="560" y="24">01001101</text>
      <text x="960" y="500">10110100</text>
    </g>

    <!-- outer + inner neon frames -->
    <rect x="20" y="20" width="1160" height="480" rx="26" fill="none" stroke="#FF4FE3" stroke-width="2.5" filter="url(#softBlur)" opacity="0.55">
      <animate attributeName="stroke" values="#FF4FE3;#22F7FF;#FF4FE3" dur="7s" repeatCount="indefinite"/>
    </rect>
    <rect x="20" y="20" width="1160" height="480" rx="26" fill="none" stroke="#FF7FEE" stroke-width="1.4">
      <animate attributeName="stroke" values="#FF7FEE;#7FF3FF;#FF7FEE" dur="7s" repeatCount="indefinite"/>
    </rect>

    <rect x="42" y="42" width="1116" height="436" rx="20" fill="none" stroke="#22F7FF" stroke-width="2.2" filter="url(#softBlur)" opacity="0.5">
      <animate attributeName="stroke" values="#22F7FF;#B084F5;#22F7FF" dur="9s" repeatCount="indefinite"/>
    </rect>
    <rect x="42" y="42" width="1116" height="436" rx="20" fill="none" stroke="#7FF3FF" stroke-width="1.2">
      <animate attributeName="stroke" values="#7FF3FF;#E3B9FF;#7FF3FF" dur="9s" repeatCount="indefinite"/>
    </rect>

    <!-- corner accent squares -->
    <g>
      <rect x="70" y="72" width="20" height="20" rx="5" fill="#0B1020" stroke="#22F7FF" stroke-width="1.4"/>
      <rect x="98" y="72" width="20" height="20" rx="5" fill="#0B1020" stroke="#FF4FE3" stroke-width="1.4"/>
      <rect x="126" y="72" width="20" height="20" rx="5" fill="#0B1020" stroke="#B084F5" stroke-width="1.4"/>
      <circle cx="80" cy="82" r="2.6" fill="#22F7FF"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="108" cy="82" r="2.6" fill="#FF4FE3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="136" cy="82" r="2.6" fill="#B084F5"><animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/></circle>
    </g>

    <!-- title -->
    <text x="600" y="185" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="54" font-weight="800" fill="url(#titleGrad)" filter="url(#textGlow)">Muhammad Aswab Khalil</text>

    <!-- subtitle -->
    <text x="600" y="232" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="19" fill="#DCEFFF" opacity="0.92">Software Engineer  |  Flutter  |  MERN  |  Computer Vision + AI</text>

    <!-- typewriter line -->
    <g>
      <clipPath id="typeClip">
        <rect x="0" y="0" width="0" height="40">
          <animate attributeName="width" values="0;760;760;0" keyTimes="0;0.45;0.9;1" dur="6s" repeatCount="indefinite"/>
        </rect>
      </clipPath>
      <g clip-path="url(#typeClip)" transform="translate(220,258)">
        <text x="0" y="20" font-family="JetBrains Mono, Consolas, monospace" font-size="17" fill="#9DFBFF">building production-ready mobile, web, and intelligent systems</text>
      </g>
      <rect x="220" y="248" width="2.4" height="20" fill="#9DFBFF">
        <animate attributeName="x" values="220;980;220" keyTimes="0;0.45;1" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0;1" dur="0.7s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- location pill -->
    <rect x="430" y="300" width="340" height="42" rx="21" fill="#0B1020" stroke="#B084F5" stroke-width="1.4">
      <animate attributeName="stroke" values="#B084F5;#22F7FF;#FF4FE3;#B084F5" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="600" y="326" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14.5" fill="#EAFBFF" letter-spacing="0.5">aswab007-ops :: Lahore, Pakistan</text>

    <!-- mission line -->
    <text x="80" y="392" font-family="JetBrains Mono, monospace" font-size="14" fill="#2FD9E8" opacity="0.9">&gt; Active Mission Profile:</text>
    <text x="80" y="424" font-family="JetBrains Mono, monospace" font-size="27" font-weight="700" fill="#EAFBFF">I turn pixels, APIs, and models into real products<tspan fill="#22F7FF">_</tspan>
      <animate attributeName="opacity" values="1;1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </text>

    <!-- status chips -->
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="700">
      <rect x="80" y="452" width="168" height="32" rx="7" fill="#0B1020" stroke="#3A4A5E"/>
      <text x="96" y="473" fill="#9FB3C8">PROFILE VIEWS</text>

      <rect x="256" y="452" width="118" height="32" rx="7" fill="#0B1020" stroke="#22F7FF"/>
      <text x="272" y="473" fill="#22F7FF">MODE: BUILDER</text>

      <rect x="382" y="452" width="220" height="32" rx="7" fill="#0B1020" stroke="#FF4FE3"/>
      <text x="398" y="473" fill="#FF9EED">BASE: LAHORE, PAKISTAN</text>
    </g>

    <!-- bottom pulse dots -->
    <circle cx="580" cy="500" r="4" fill="#22F7FF"><animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="500" r="4" fill="#FF4FE3"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="500" r="4" fill="#7FA8FF"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" begin="0.6s" repeatCount="indefinite"/></circle>
  </g>
</svg>
