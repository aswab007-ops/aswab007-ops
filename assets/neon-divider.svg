<svg width="1200" height="26" viewBox="0 0 1200 26" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Neon divider">
  <defs>
    <linearGradient id="flowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22F7FF" stop-opacity="0"/>
      <stop offset="20%" stop-color="#22F7FF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#B084F5" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#FF4FE3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF4FE3" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-600 0; 600 0; -600 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="lineGlow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>
  <rect x="0" y="12" width="1200" height="1.4" fill="#1B2733"/>
  <rect x="0" y="11.5" width="1200" height="2.5" fill="url(#flowLine)" filter="url(#lineGlow)"/>
  <circle cy="13" r="3.4" fill="#EAFBFF">
    <animateMotion path="M0,0 H1200 H0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.95;1" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
