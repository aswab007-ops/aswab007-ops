<svg width="1160" height="300" viewBox="0 0 1160 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Boot console showing profile systems loaded">
  <defs>
    <radialGradient id="screenGlow" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#0B2530" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#020608" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="bezelEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22F7FF"/>
      <stop offset="50%" stop-color="#B084F5"/>
      <stop offset="100%" stop-color="#FF4FE3"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glowSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="panelClip"><rect x="0" y="0" width="1160" height="300" rx="22"/></clipPath>
  </defs>

  <g clip-path="url(#panelClip)">
    <rect width="1160" height="300" fill="#04070a"/>
    <rect x="3" y="3" width="1154" height="294" rx="20" fill="none" stroke="url(#bezelEdge)" stroke-width="2.5"/>

    <!-- screen -->
    <rect x="26" y="26" width="1108" height="248" rx="12" fill="url(#screenGlow)" stroke="#123240" stroke-width="1.5"/>

    <!-- scanline shimmer -->
    <rect x="26" y="26" width="1108" height="6" fill="#22F7FF" opacity="0.06">
      <animate attributeName="y" values="26;268;26" dur="5s" repeatCount="indefinite"/>
    </rect>

    <!-- top bar dots -->
    <circle cx="52" cy="48" r="5" fill="#FF4FE3" opacity="0.8"/>
    <circle cx="70" cy="48" r="5" fill="#F5D742" opacity="0.8"/>
    <circle cx="88" cy="48" r="5" fill="#22F7FF" opacity="0.8"/>
    <text x="1110" y="52" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#3FB6C9" opacity="0.6">profile.sh</text>

    <g font-family="JetBrains Mono, Consolas, monospace" font-size="15.5" fill="#BFEFFF">
      <text x="580" y="90" text-anchor="middle" fill="#9DFBFF">&#10022; booting profile...</text>

      <text x="580" y="122" text-anchor="middle">
        <tspan fill="#BFEFFF">&#128241; loading mobile systems</tspan><tspan fill="#4B6472">............</tspan><tspan fill="#3CE86B" font-weight="700"> done</tspan>
      </text>
      <text x="580" y="150" text-anchor="middle">
        <tspan fill="#BFEFFF">&#9776; loading full-stack architecture</tspan><tspan fill="#4B6472">....</tspan><tspan fill="#3CE86B" font-weight="700"> done</tspan>
      </text>
      <text x="580" y="178" text-anchor="middle">
        <tspan fill="#BFEFFF">&#128065; loading computer vision models</tspan><tspan fill="#4B6472">....</tspan><tspan fill="#3CE86B" font-weight="700"> done</tspan>
      </text>
      <text x="580" y="206" text-anchor="middle">
        <tspan fill="#BFEFFF">&#128161; loading product instincts</tspan><tspan fill="#4B6472">..........</tspan><tspan fill="#3CE86B" font-weight="700"> done</tspan>
      </text>

      <text x="580" y="238" text-anchor="middle" fill="#FF9EED">&#10052; status: building things that look good, work hard, and survive real users</text>

      <text x="60" y="264" fill="#22F7FF">&gt; <tspan fill="#EAFBFF">_</tspan>
        <animate attributeName="opacity" values="1;1;0;0;1" dur="1.2s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- side connector glyphs -->
    <g stroke="#3A4A5E" fill="none" opacity="0.7">
      <rect x="1122" y="140" width="18" height="30" rx="4"/>
      <circle cx="1131" cy="150" r="2" fill="#3A4A5E"/>
      <circle cx="1131" cy="160" r="2" fill="#3A4A5E"/>
    </g>
  </g>
</svg>
